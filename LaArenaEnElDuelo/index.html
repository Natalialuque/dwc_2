<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- para poder permitir la importacion de modulos y el main donde recogemos todo -->
    <script type="module" src="main.js"></script>
    <link rel="stylesheet"  href="css/stylos.css">
</head>
<body>
    <!-- Formulario de creaccion de personaje -->
    <form id="form-personaje">
        <input type="text" id="nombre" placeholder="Nombre" required>

        <input type="number" id="fuerza" min="1" max="10" placeholder="Fuerza" required>

        <select id="clase">
            <option value="Guerrero">Guerrero</option>
            <option value="Mago">Mago</option>
        </select>

        <button type="submit">Crear</button>
    </form>

    <hr>

    <!-- Contenedores para mostrar las tarjetas, dichas tarjetas las creremos con createElement lo he hecho asi para tener 
     tanto html como nodos,ya que solo pides que lo usemos a la hora de crear -->
    <div id="tarjetas"></div>
    <h3>Batalla</h3>
    <div id="batalla"></div>

</body>
</html>
