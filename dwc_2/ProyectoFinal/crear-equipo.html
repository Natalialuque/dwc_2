<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckFootball - Crear Equipo</title>
    <link rel="icon" type="image/png" href="./recursos/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./estilos/styles.css">
    <script src="js/crear-equipo.js" type="module"></script>
</head>

<body>

    <header class="main-header">
        <div class="header-container">
            <a class="logo-container">
                <img src="./recursos/logo.png" alt="Logo de CheckFootball" class="logo-img">
                <span class="logo-text">check<span class="logo-accent">Football</span></span>
            </a>

            <div class="header-actions">
                <a href="#" class="btn-live" id="btnCerrar">
                    <span class="live-icon"></span>
                    Cerrar
                </a>
            </div>
        </div>
    </header>

    <main>
        <h1 id="titulo">Crear Equipo</h1>

        <div class="contenedor-formulario">
            <form id="formCrearEquipo" class="form-equipo" novalidate>

                <div class="form-grupo">
                    <label class="form-label" for="selectLogo">Logo del equipo</label>
                    <div class="select-logo-wrapper">
                        <select id="selectLogo" class="form-select" name="crest">
                            <option value="">-- Selecciona un logo --</option>
                        </select>
                        <div class="preview-logo">
                            <img id="previewImg" src="" alt="Preview logo" class="logo-preview-img" style="display:none;">
                        </div>
                    </div>
                    <span class="form-error" id="errorLogo"></span>
                </div>

                <div class="form-grupo">
                    <label class="form-label" for="inputNombre">Nombre del equipo</label>
                    <input type="text" id="inputNombre" class="form-input" name="shortName" placeholder="Ej: Real Madrid">
                    <span class="form-error" id="errorNombre"></span>
                </div>

                <div class="form-grupo">
                    <label class="form-label" for="inputFundado">Año de fundación</label>
                    <input type="text" id="inputFundado" class="form-input" name="founded" placeholder="Ej: 1902" maxlength="4">
                    <span class="form-error" id="errorFundado"></span>
                </div>

                <div class="form-grupo">
                    <label class="form-label" for="inputEstadio">Nombre del estadio</label>
                    <input type="text" id="inputEstadio" class="form-input" name="venue" placeholder="Ej: Santiago Bernabéu">
                    <span class="form-error" id="errorEstadio"></span>
                </div>

                <div class="form-grupo">
                    <label class="form-label" for="inputWeb">Sitio web</label>
                    <input type="text" id="inputWeb" class="form-input" name="website" placeholder="Ej: https://www.realmadrid.com">
                    <span class="form-error" id="errorWeb"></span>
                </div>

                <div class="form-grupo form-acciones">
                    <button type="submit" class="btn-anadir">Añadir equipo</button>
                </div>

                <div id="mensajeExito" class="mensaje-exito" style="display:none;">
                    Equipo creado correctamente.
                </div>

            </form>
        </div>
    </main>

</body>

</html>
